# ==============================================================================
# FONT SETTINGS
# ==============================================================================
# Note: Kitty is very smart about fonts. If "JetBrainsMonoNerdFontMono" doesn't 
# load, try "JetBrainsMono Nerd Font Mono" with spaces.
font_family      JetBrainsMonoNerdFontMono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 24.0

# ==============================================================================
# WINDOW SETTINGS
# ==============================================================================
# Start with exact column and line dimensions
remember_window_size  no
initial_window_width  140c
initial_window_height 38c

# Window padding (x and y)
window_padding_width 5

# Window decorations (full is default, but we can be explicit)
hide_window_decorations no

# Background opacity
background_opacity 1.0

# ==============================================================================
# SCROLLING
# ==============================================================================
scrollback_lines 10000

# Kitty uses wheel multiplier for mouse scrolling
wheel_scroll_multiplier 3.0

# ==============================================================================
# COLOR SCHEME (Gruvbox Dark)
# ==============================================================================
foreground #ebdbb2
background #282828

# Cursor
cursor            #ebdbb2
cursor_text_color #282828

# Selection
selection_foreground #282828
selection_background #ebdbb2

# Normal Colors
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984

# Bright Colors
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2
